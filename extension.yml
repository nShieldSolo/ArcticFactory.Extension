schema_version: "1.0"

extension:
  id: "arctic-factory"
  name: "Arctic Factory Extension"
  version: "0.1.0"
  description: "A spec-kit extension providing workflow utilities for Arctic Factory projects: Vietnamese-friendly progress reporting, task health checks, and spec drift detection."
  author: "namht"
  repository: "https://github.com/nShieldSolo/ArcticFactory.Extension"
  license: "MIT"

requires:
  speckit_version: ">=0.1.0"

provides:
  commands:
    - name: "specify.skills-check"
      file: "commands/skills-check.md"
      description: "Kiểm tra và cài đặt các Skills cần thiết cho project"
    - name: "specify.tester"
      file: "commands/tester.md"
      description: "Tạo test plan và test cases dựa trên spec"

tags:
  - "visibility"
  - "process"
  - "docs"
  - "vietnamese"
